# nginx vhost for staging.levelchannel.ru
#
# Operator install:
#   cp ops/staging/nginx/staging.conf /etc/nginx/sites-available/
#   ln -s /etc/nginx/sites-available/staging.conf /etc/nginx/sites-enabled/
#   nginx -t
#   systemctl reload nginx
#
# Prerequisites:
#   - DNS A record staging.levelchannel.ru → VPS IP
#   - SSL cert via certbot:
#       certbot --nginx -d staging.levelchannel.ru
#   - levelchannel-staging.service running on 127.0.0.1:3001
#
# Notes:
#   - We add `X-Staging: true` so any consumer (Sentry, webhooks, GH
#     Actions probes) can distinguish staging traffic from prod.
#   - Robots blocked at vhost level — staging must NOT appear in
#     search results (would dilute prod SEO and leak test data).
#   - CSP header here is INTENTIONALLY removed; the Next.js proxy.ts
#     middleware stamps per-request CSP with a nonce. nginx-side CSP
#     would conflict.

server {
    listen 80;
    listen [::]:80;
    server_name staging.levelchannel.ru;

    # Redirect to https (certbot adds this block automatically; included
    # here for documentation, certbot will overwrite).
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name staging.levelchannel.ru;

    # certbot manages these:
    ssl_certificate /etc/letsencrypt/live/staging.levelchannel.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging.levelchannel.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Search engines: stay out.
    add_header X-Robots-Tag "noindex, nofollow, noarchive, nosnippet" always;

    # Mark staging in every response — Sentry, smoke probes, webhooks
    # use this to scope logging without parsing the URL.
    add_header X-Staging "true" always;

    # Standard hardening (same shape as prod vhost).
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    client_max_body_size 5M;
    proxy_buffering on;
    proxy_read_timeout 30s;
    proxy_send_timeout 30s;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        # Pass an explicit staging marker upstream so route handlers
        # can fork behaviour without re-reading the LC_ENV env var.
        proxy_set_header X-Lc-Env "staging";
    }

    # Don't log noisy bots & uptime probes by default. Operator can
    # add Cloudflare-issued IPs to a separate access log if needed.
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; return 200 "User-agent: *\nDisallow: /\n"; add_header Content-Type text/plain; }
}
