# Minimal HTTP-only vhost for the certbot bootstrap step.
#
# certbot --nginx needs an existing server_name match for
# staging.levelchannel.ru BEFORE it can solve the HTTP-01 challenge
# and provision the TLS cert. This config provides exactly that — port
# 80 only, no SSL block, no proxy yet — so the runbook can:
#
#   Step 5 — install THIS file as sites-enabled/staging.conf
#   Step 6 — run certbot --nginx, which adds the 443 block + redirect
#   Step 6 (post-certbot) — replace with the full staging.conf
#
# Once cert is provisioned, ops/staging/nginx/staging.conf takes over.

server {
    listen 80;
    listen [::]:80;
    server_name staging.levelchannel.ru;

    # certbot --nginx mode injects its own ACME challenge handler into
    # this server block at cert-issuance time; no webroot path needed
    # here. (`certbot --webroot` is a different flow that DOES need a
    # location for /.well-known/acme-challenge/; we don't use it.)
    location / {
        return 503;
    }
}
