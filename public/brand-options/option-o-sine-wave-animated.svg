<svg width="320" height="80" viewBox="0 0 320 80" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="LevelChannel — Option O animated: ascending wave with draw-on + endpoint pulse + endless shimmer">
  <defs>
    <linearGradient id="gradOanim" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#C87878"/>
      <stop offset="100%" stop-color="#E8A890"/>
    </linearGradient>
    <filter id="glowO" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Mark group: ascending sine wave with draw-on animation + endpoint pulses -->
  <g fill="none" stroke="url(#gradOanim)" stroke-linecap="round" stroke-linejoin="round">

    <!-- Faint ghost trail (slower, behind main path) -->
    <path
      d="M 10 60
         C 14 38, 22 60, 28 44
         C 34 28, 44 54, 50 36
         C 54 24, 58 30, 62 22"
      stroke-width="6"
      opacity="0.18"
      stroke-dasharray="160"
      stroke-dashoffset="160">
      <animate
        attributeName="stroke-dashoffset"
        from="160"
        to="0"
        dur="1.8s"
        begin="0s"
        fill="freeze"/>
      <animate
        attributeName="opacity"
        values="0.18; 0.32; 0.18"
        dur="3.6s"
        begin="1.8s"
        repeatCount="indefinite"/>
    </path>

    <!-- Main path with draw-on (stroke-dashoffset animation) -->
    <path
      d="M 10 60
         C 14 38, 22 60, 28 44
         C 34 28, 44 54, 50 36
         C 54 24, 58 30, 62 22"
      stroke-width="3"
      stroke-dasharray="160"
      stroke-dashoffset="160">
      <animate
        attributeName="stroke-dashoffset"
        from="160"
        to="0"
        dur="1.4s"
        begin="0.2s"
        fill="freeze"/>
    </path>

    <!-- Endpoint dots: pop-in after draw, then endless gentle pulse -->
    <circle cx="10" cy="60" r="0" fill="url(#gradOanim)" stroke="none">
      <animate attributeName="r" from="0" to="3.4" dur="0.3s" begin="0.2s" fill="freeze"/>
      <animate attributeName="r" values="3.4; 4.2; 3.4" dur="2.4s" begin="2.0s" repeatCount="indefinite"/>
    </circle>
    <circle cx="62" cy="22" r="0" fill="url(#gradOanim)" stroke="none" filter="url(#glowO)">
      <animate attributeName="r" from="0" to="3.4" dur="0.3s" begin="1.6s" fill="freeze"/>
      <animate attributeName="r" values="3.4; 4.6; 3.4" dur="2.4s" begin="2.0s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Wordmark: fade in after wave draws -->
  <text x="82" y="50" font-family="Inter, -apple-system, sans-serif" font-size="28" font-weight="700" letter-spacing="-0.02em" fill="#F5F5F7" opacity="0">
    <tspan>Level</tspan><tspan fill="url(#gradOanim)" font-weight="800">Channel</tspan>
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="1.4s" fill="freeze"/>
  </text>
</svg>
