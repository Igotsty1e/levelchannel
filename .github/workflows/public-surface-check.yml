name: Public Surface Check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  public-surface:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Run public-surface guardrail
        run: bash scripts/public-surface-check.sh
