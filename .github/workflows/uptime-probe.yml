name: uptime-probe

# External health probe for levelchannel.ru. Runs every 5 minutes and
# opens / closes a GitHub Issue tagged `uptime-incident` based on health.
# Ping schedule frequency is at the lower bound — GitHub Actions cron
# sometimes delays scheduled runs under load, so 5 min is the practical
# floor and means worst-case detection latency is ~10 min. Good enough
# for "did the site fall over"; if we ever need true 30s detection we
# add a second-tier external probe (BetterStack / Healthchecks.io).
#
# How it decides:
#   - 3 curl attempts with 20s pause inside one job
#   - probe is OK if ANY attempt returns HTTP 200 with body containing
#     "status":"ok" AND "database":"ok"
#   - probe is FAIL otherwise
#
# Issue lifecycle (idempotent — the same workflow run handles all 4
# states without duplicating issues):
#   - FAIL + no open incident issue   → create new issue
#   - FAIL + open issue already       → comment a flap line with timestamp
#   - OK   + open issue (recovery)    → close it with a recovery comment
#   - OK   + no open issue            → no-op
#
# Owner of this repo is auto-subscribed to issue create/comment, so
# notifications go to the owner's GitHub email. No secrets, no third
# party. Runbook: OPERATIONS.md §14.

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: uptime-probe
  cancel-in-progress: false

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Probe /api/health (3 retries, 20s apart)
        id: probe
        env:
          HEALTH_DETAIL_SECRET: ${{ secrets.HEALTH_DETAIL_SECRET }}
        run: |
          set -uo pipefail

          URL="https://levelchannel.ru/api/health"
          OK=0
          LAST_BODY=""
          LAST_CODE=""
          LAST_ERR=""

          # Codex 2026-05-08 (LOW-MEDIUM) — /api/health is now slim by
          # default. The privileged shape (with `database` etc.)
          # requires the X-Health-Detail header to match
          # HEALTH_DETAIL_SECRET in prod env. We pass the secret
          # below; if it's not set as a repo secret, we fall back to
          # the slim status-only check (still detects outage).
          AUTH_HEADER=()
          if [ -n "${HEALTH_DETAIL_SECRET:-}" ]; then
            AUTH_HEADER=(-H "X-Health-Detail: ${HEALTH_DETAIL_SECRET}")
          fi

          for i in 1 2 3; do
            echo "::group::Attempt $i"
            # No `--fail-with-body`: we want the body even on HTTP 5xx
            # so it lands in the issue. EXIT here only signals network
            # / DNS / TLS / timeout — not HTTP status.
            EXIT=0
            BODY=$(curl --silent --show-error \
                        --max-time 15 \
                        "${AUTH_HEADER[@]}" \
                        --write-out "\n__HTTP_CODE__:%{http_code}" \
                        "$URL" 2>&1) || EXIT=$?

            CODE=$(printf '%s' "$BODY" | sed -n 's/.*__HTTP_CODE__:\([0-9]*\).*/\1/p' | tail -1)
            BODY_ONLY=$(printf '%s' "$BODY" | sed 's/\n*__HTTP_CODE__:[0-9]*$//')

            echo "exit=$EXIT code=$CODE"
            # Don't echo $BODY_ONLY — would land in public action log.

            LAST_CODE="$CODE"
            LAST_BODY="$BODY_ONLY"
            LAST_ERR="curl exit $EXIT"

            # Slim shape `{status, version}` is enough for "is the app
            # alive" — `status:ok` already requires every internal
            # check to pass. The privileged `{database:ok}` check is
            # nice to have, not load-bearing here.
            if [ "$EXIT" = "0" ] && [ "$CODE" = "200" ] && \
               printf '%s' "$BODY_ONLY" | grep -q '"status":"ok"'; then
              OK=1
              echo "::endgroup::"
              break
            fi
            echo "::endgroup::"
            [ "$i" != "3" ] && sleep 20
          done

          # Codex 2026-05-08 (MEDIUM) — body NEVER goes to outputs
          # because run logs of a public repo are public-readable.
          # Hash + length here; raw body stays only in this job's
          # ephemeral env which the operator can recover from log
          # context (private workflow log) if a real incident
          # demands deep diagnosis.
          BODY_LEN=$(printf '%s' "$LAST_BODY" | wc -c | tr -d ' ')
          BODY_HASH=$(printf '%s' "$LAST_BODY" | shasum -a 256 | awk '{print $1}' | cut -c1-12)

          {
            echo "ok=$OK"
            echo "last_code=$LAST_CODE"
            echo "last_err=$LAST_ERR"
            echo "url=$URL"
            echo "body_len=$BODY_LEN"
            echo "body_hash=$BODY_HASH"
          } >> "$GITHUB_OUTPUT"

          # Always exit 0 — we communicate result via outputs, not exit code.
          # The Issue management step is the one that takes action.
          exit 0

      - name: Manage incident issue (idempotent)
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b  # v7
        env:
          PROBE_OK: ${{ steps.probe.outputs.ok }}
          PROBE_CODE: ${{ steps.probe.outputs.last_code }}
          PROBE_ERR: ${{ steps.probe.outputs.last_err }}
          PROBE_URL: ${{ steps.probe.outputs.url }}
          PROBE_BODY_LEN: ${{ steps.probe.outputs.body_len }}
          PROBE_BODY_HASH: ${{ steps.probe.outputs.body_hash }}
        with:
          script: |
            // Codex 2026-05-08 (MEDIUM) — only the body's length +
            // first-12 hex of sha256 cross over into the issue body.
            // Repo is PUBLIC so anything we write here becomes
            // searchable / indexable; raw response bodies (5xx HTML,
            // stack traces, upstream error text) MUST NOT land here.
            const ok      = process.env.PROBE_OK === '1'
            const code    = process.env.PROBE_CODE || '(no response)'
            const err     = process.env.PROBE_ERR || '(no error info)'
            const url     = process.env.PROBE_URL
            const bodyLen = process.env.PROBE_BODY_LEN || '0'
            const bodyHash = process.env.PROBE_BODY_HASH || '(none)'
            const ts      = new Date().toISOString()
            const runUrl  = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            const label   = 'uptime-incident'

            // 1. Find any open uptime-incident issue.
            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: label,
              per_page: 5,
            })
            const openIssue = openIssues[0] || null

            if (!ok) {
              const failBody =
                `**${url}** is unhealthy.\n\n` +
                `- detected at: \`${ts}\`\n` +
                `- last HTTP code: \`${code}\`\n` +
                `- ${err}\n` +
                `- response body: ${bodyLen} bytes, sha256 \`${bodyHash}\` (raw body NOT logged — repo is public)\n` +
                `- probe run: ${runUrl}\n\n` +
                `Diagnose: see \`OPERATIONS.md §14\` runbook.`

              if (!openIssue) {
                await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: `[uptime] ${url} is DOWN`,
                  body: failBody,
                  labels: [label],
                })
                core.notice(`Opened new uptime-incident issue.`)
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: openIssue.number,
                  body: `Still failing at \`${ts}\` — code \`${code}\`, ${err}. Run: ${runUrl}`,
                })
                core.notice(`Flap-commented on existing issue #${openIssue.number}.`)
              }
              return
            }

            // probe ok
            if (openIssue) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: openIssue.number,
                body: `Recovered at \`${ts}\`. Final probe HTTP \`${code}\`. Closing.\nRun: ${runUrl}`,
              })
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: openIssue.number,
                state: 'closed',
                state_reason: 'completed',
              })
              core.notice(`Closed recovered issue #${openIssue.number}.`)
            } else {
              core.info(`Probe ok, no open incident — nothing to do.`)
            }
