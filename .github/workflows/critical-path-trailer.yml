name: Critical-Path Trailer Check

on:
  pull_request:

jobs:
  critical-path-trailer:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          # Fetch enough history to compute merge-base vs the target
          # branch + iterate the PR's commit messages.
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4
        with:
          node-version: '20'

      - name: Run critical-path trailer guard
        run: node scripts/check-critical-path-trailer.mjs
